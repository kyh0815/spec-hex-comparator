<!doctype html>
<html lang="ko" data-tool="hex">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>As-Is / To-Be 데이터 비교 검증</title>
<style>
/* Hex Comparator — Linear-style minimal redesign.
 * Sentence case throughout. Decorative icons removed. Only PASS/FAIL
 * accessibility icons retained (color-blind dual-encoding mandate). */

:root {
  --bg:          oklch(99% 0 0);
  --bg-sunken:   oklch(97.5% 0 0);
  --surface:     #fff;
  --surface-2:   oklch(98.5% 0 0);

  --ink:         oklch(22% 0.005 270);
  --ink-2:       oklch(40% 0.006 270);
  --ink-3:       oklch(55% 0.005 270);
  --ink-4:       oklch(72% 0.005 270);
  --line:        oklch(93% 0.003 270);
  --line-2:      oklch(88% 0.004 270);
  --line-3:      oklch(82% 0.005 270);

  --accent:      oklch(52% 0.18 268);
  --accent-2:    oklch(45% 0.19 268);
  --accent-soft: oklch(96% 0.025 268);
  --focus-ring:  oklch(85% 0.10 268);

  --pass:        oklch(52% 0.13 152);
  --pass-2:      oklch(42% 0.13 152);
  --pass-soft:   oklch(96.5% 0.030 152);
  --pass-border: oklch(85% 0.060 152);

  --fail:        oklch(54% 0.20 25);
  --fail-2:      oklch(44% 0.21 25);
  --fail-soft:   oklch(97% 0.025 25);
  --fail-border: oklch(85% 0.080 25);

  --warn:        oklch(60% 0.13 75);
  --warn-2:      oklch(46% 0.14 75);
  --warn-soft:   oklch(97% 0.030 90);
  --warn-border: oklch(86% 0.075 80);

  --diff-bg:        oklch(92% 0.090 85);
  --diff-fg:        oklch(28% 0.080 60);
  --diff-residual-bg: oklch(89% 0.060 290);
  --diff-residual-fg: oklch(30% 0.080 290);

  /* 글리프-단위 폴백: ASCII는 시스템 산세리프, 일본어는 Hiragino/Yu Gothic UI/Meiryo,
     한국어는 Apple SD Gothic Neo/맑은 고딕으로 명시 매핑. */
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Meiryo",
          "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas,
          "D2Coding", "MS Gothic", "Courier New", monospace;

  --r-xs: 4px;
  --r-sm: 6px;
  --r:    8px;
  --r-lg: 10px;

  --shadow-xs: 0 1px 0 rgba(17, 24, 39, 0.03);
  --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04), 0 0 0 1px rgba(17, 24, 39, 0.04);
  --shadow:    0 4px 12px -4px rgba(17, 24, 39, 0.08), 0 0 0 1px rgba(17, 24, 39, 0.05);
  --shadow-lg: 0 12px 32px -10px rgba(17, 24, 39, 0.14), 0 0 0 1px rgba(17, 24, 39, 0.06);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11", "tnum";
  letter-spacing: -0.005em;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; }

.mono {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum", "zero";
  letter-spacing: 0;
}
.muted { color: var(--ink-3); }
.small { font-size: 13px; line-height: 1.5; }

/* ── App shell ─────────────────────────────────────────────────── */
.app {
  max-width: 1080px;
  margin: 0 auto;
  padding: 52px 32px 120px;
}
.app__title {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0 0 6px;
  color: var(--ink);
}
.app__subtitle {
  color: var(--ink-3);
  margin: 0 0 36px;
  font-size: 14.5px;
  max-width: 700px;
  line-height: 1.55;
}
.app__subtitle .mono { color: var(--ink-2); font-weight: 500; }

/* Header + language selector (i18n 컨트롤 — 디자인엔 없는 추가분, 토큰 일치) */
.app__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
}
.app__headtext { min-width: 0; }
.langselect {
  flex: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-3);
}
.langselect select {
  appearance: none;
  -webkit-appearance: none;
  height: 32px;
  padding: 0 30px 0 10px;
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--ink);
  font-size: 13.5px;
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23999' d='M0 0h10L5 6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}
.langselect select:hover { border-color: var(--line-3); }
.langselect select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
@media (max-width: 720px) { .app__header { flex-direction: column; gap: 8px; } }

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 22px 24px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-xs);
}
.card__title {
  font-size: 14.5px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--ink);
  margin: 0 0 4px;
}
.card > .small.muted,
.card > .card__subtitle {
  color: var(--ink-3);
  margin: 0 0 20px;
  font-size: 13.5px;
}

/* ── Buttons ───────────────────────────────────────────────────── */
.btn {
  appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 36px;
  padding: 0 16px;
  border: 1px solid var(--ink);
  border-radius: var(--r-sm);
  background: var(--ink);
  color: #fff;
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, opacity 0.12s;
}
.btn:hover { background: oklch(15% 0.005 270); border-color: oklch(15% 0.005 270); }
.btn:active { opacity: 0.85; }
.btn:disabled {
  background: var(--bg-sunken);
  border-color: var(--line-2);
  color: var(--ink-4);
  cursor: not-allowed;
}
.btn--secondary {
  background: var(--surface);
  border-color: var(--line-2);
  color: var(--ink);
}
.btn--secondary:hover { background: var(--bg-sunken); border-color: var(--line-3); }
.btnrow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── Messages ──────────────────────────────────────────────────── */
.error, .warn, .render-note {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--r-sm);
  font-size: 14.5px;
  line-height: 1.5;
  border: 1px solid;
}
.error {
  color: var(--fail-2);
  background: var(--fail-soft);
  border-color: var(--fail-border);
}
.error::before {
  content: "";
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--fail);
  flex: none;
  margin-top: 3px;
  background-image: linear-gradient(#fff, #fff), linear-gradient(#fff, #fff);
  background-size: 2px 6px, 2px 2px;
  background-position: center 3px, center 9px;
  background-repeat: no-repeat;
}
.warn {
  color: var(--warn-2);
  background: var(--warn-soft);
  border-color: var(--warn-border);
}
.warn::before {
  content: "";
  width: 14px; height: 14px;
  flex: none;
  margin-top: 3px;
  border-radius: 50%;
  background: var(--warn);
  background-image: linear-gradient(#fff, #fff), linear-gradient(#fff, #fff);
  background-size: 2px 6px, 2px 2px;
  background-position: center 3px, center 9px;
  background-repeat: no-repeat;
}
.render-note {
  color: var(--ink-2);
  background: var(--bg-sunken);
  border-color: var(--line);
  font-size: 13.5px;
}
.render-note::before {
  content: "";
  width: 4px;
  flex: none;
  margin: 4px 0;
  background: var(--ink-4);
  border-radius: 2px;
  align-self: stretch;
}

/* ── A · Uploads ───────────────────────────────────────────────── */
.uploads {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.uploads > .drop:nth-of-type(1) { grid-column: 1; grid-row: 1; }
.uploads > .drop:nth-of-type(2) { grid-column: 2; grid-row: 1; }
.drop {
  position: relative;
  border: 1px dashed var(--line-2);
  border-radius: var(--r);
  background: var(--surface-2);
  padding: 16px 16px;
  min-height: 130px;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.drop:hover { border-color: var(--line-3); background: var(--bg-sunken); }
.drop--over {
  border-style: solid;
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent);
}
.drop--loaded {
  border-style: solid;
  border-color: var(--line);
  background: var(--surface);
  cursor: default;
  box-shadow: var(--shadow-xs);
}
.drop__role {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-3);
  letter-spacing: -0.005em;
}
.drop--loaded .drop__role { color: var(--ink-2); }
.drop__name {
  font-family: var(--mono);
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ink);
  word-break: break-all;
  line-height: 1.45;
}
.drop--loaded .drop__name {
  display: flex;
  align-items: center;
  gap: 8px;
}
.drop--loaded .drop__name::before {
  content: "";
  width: 14px; height: 14px;
  border-radius: 3px;
  background: var(--pass);
  flex: none;
  background-image: linear-gradient(45deg, transparent 38%, #fff 38% 50%, transparent 50%),
                    linear-gradient(-45deg, transparent 50%, #fff 50% 62%, transparent 62%);
  background-size: 4px 5px, 7px 6px;
  background-position: 3px 7px, 4px 4px;
  background-repeat: no-repeat;
}
.drop__hint {
  color: var(--ink-3);
  font-size: 13px;
  margin-top: auto;
}
.drop__hint .mono { color: var(--ink-2); }

.colchips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.chip {
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-size: 12px;
  padding: 3px 8px 2px;
  background: var(--bg-sunken);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--ink-2);
  white-space: nowrap;
}
.chip__size,
.chip__enc { color: var(--ink-4); font-weight: 400; }

/* ── A · Field / toggles ──────────────────────────────────────── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 18px;
}
.field__label {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.field__label .muted { font-weight: 400; }
.field select,
.field input[type="text"] {
  appearance: none;
  -webkit-appearance: none;
  height: 38px;
  padding: 0 34px 0 14px;
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 14.5px;
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23999' d='M0 0h10L5 6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}
.field select:hover { border-color: var(--line-3); }
.field select:focus,
.field input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--focus-ring);
}

.toggles { display: flex; flex-wrap: wrap; gap: 6px; }
.toggle {
  appearance: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 13px;
  padding: 5px 11px 4px;
  border-radius: var(--r-sm);
  border: 1px solid;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.toggle--on {
  background: var(--surface);
  border-color: var(--line-2);
  color: var(--ink);
}
.toggle--on::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--pass);
  flex: none;
}
.toggle--on:hover { border-color: var(--line-3); background: var(--bg-sunken); }
.toggle--off {
  background: var(--bg-sunken);
  border-color: var(--line);
  color: var(--ink-3);
}
.toggle--off::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-4);
  flex: none;
  opacity: 0.6;
}
.toggle--off:hover { color: var(--ink-2); }
.toggle--pk {
  background: var(--accent-soft);
  border-color: color-mix(in oklch, var(--accent) 30%, var(--line));
  color: var(--accent-2);
  cursor: not-allowed;
}
.toggle--pk::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex: none;
}
.toggle--pk::after {
  content: "PK";
  font-size: 11px;
  font-weight: 600;
  margin-left: 4px;
  padding: 1px 5px 0;
  background: var(--accent);
  color: #fff;
  border-radius: 3px;
  letter-spacing: 0.02em;
}

.checkrow {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 4px 0;
  cursor: pointer;
  user-select: none;
  font-size: 14.5px;
  color: var(--ink-2);
}
.checkrow input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 15px; height: 15px;
  border: 1px solid var(--line-3);
  border-radius: 3px;
  background: var(--surface);
  cursor: pointer;
  position: relative;
  flex: none;
  margin: 0;
  transition: border-color 0.1s, background 0.1s;
}
.checkrow input[type="checkbox"]:hover { border-color: var(--ink-3); }
.checkrow input[type="checkbox"]:checked {
  background: var(--ink);
  border-color: var(--ink);
}
.checkrow input[type="checkbox"]:checked::after {
  content: "";
  position: absolute;
  left: 4px; top: 1px;
  width: 4px; height: 8px;
  border: solid #fff;
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}
.checkrow:hover { color: var(--ink); }


/* ── B · Verdict ───────────────────────────────────────────────── */
.verdict {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: center;
  padding: 24px 28px;
  border-radius: var(--r-lg);
  border: 1px solid;
  margin-bottom: 12px;
  background: var(--surface);
  box-shadow: var(--shadow-xs);
}
.verdict--pass { border-color: var(--pass-border); background: var(--pass-soft); }
.verdict--fail { border-color: var(--fail-border); background: var(--fail-soft); }

.verdict__badge {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-width: 132px;
  padding: 14px 22px;
  border-radius: var(--r);
  color: #fff;
  font-weight: 600;
  font-size: 26px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.verdict--pass .verdict__badge { background: var(--pass); }
.verdict--fail .verdict__badge { background: var(--fail); }
.verdict__badge svg {
  width: 14px;
  height: 14px;
  display: block;
  opacity: 0.92;
}

.verdict__reason {
  font-size: 17.5px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.45;
}
.verdict__reason b {
  font-weight: 600;
  font-family: var(--mono);
  font-size: 16.5px;
  color: inherit;
  padding: 0 1px;
}
.verdict--fail .verdict__reason b { color: var(--fail-2); }
.verdict__reason .small {
  margin-top: 6px;
  font-weight: 400;
  color: var(--warn-2);
  font-size: 13.5px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;       /* 칩이 많을 때 자연스럽게 다음 줄로 */
  gap: 6px;              /* 행간/열간 모두 6px */
  min-width: 0;          /* 부모 그리드/플렉스 내에서 줄임표·줄바꿈 활성화 */
}
.verdict__reason .small::before {
  content: "";
  width: 3px;
  height: 14px;
  background: var(--warn);
  border-radius: 1.5px;
  flex: none;
}

.verdict__meta {
  font-size: 13px;
  color: var(--ink-2);
  text-align: right;
  line-height: 1.5;
  min-width: 200px;
  margin: 0;
}
.verdict__meta .mono { color: var(--ink); font-weight: 500; }
.verdict__meta dt {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 6px;
  font-weight: 400;
}
.verdict__meta dt:first-child { margin-top: 0; }
.verdict__meta dd { margin: 0 0 2px; }

/* ── C · Metrics ───────────────────────────────────────────────── */
.metrics {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--surface);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow-xs);
}
.metric {
  padding: 18px 20px 16px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.metric:last-child { border-right: 0; }
.metric__num {
  font-family: var(--mono);
  font-size: 27px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.metric__label {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: -0.005em;
}
.metric[data-kind="match"] .metric__num    { color: var(--pass-2); }
.metric[data-kind="mismatch"] .metric__num { color: var(--fail-2); }
.metric[data-kind="mismatch"][data-value="0"] .metric__num { color: var(--ink-4); }
.metric[data-kind="only-a"][data-value="0"] .metric__num,
.metric[data-kind="only-b"][data-value="0"] .metric__num { color: var(--ink-4); }

/* ── D · Filters & detail ──────────────────────────────────────── */
.filters {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-bottom: 14px;
  padding: 3px;
  background: var(--bg-sunken);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  width: fit-content;
}
.filters button {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-3);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s, color 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.filters button:hover { color: var(--ink); }
.filters button[aria-pressed="true"] {
  background: var(--surface);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(17, 24, 39, 0.06), 0 0 0 1px rgba(17, 24, 39, 0.04);
}
.filters button .count {
  font-family: var(--mono);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  padding: 0 5px;
  background: transparent;
  border-radius: 3px;
  color: var(--ink-3);
}
.filters button[aria-pressed="true"] .count {
  background: var(--bg-sunken);
  color: var(--ink-2);
}
/* 두 개 이상의 필터 pill을 가로로 배치 — 각 그룹이 독립된 pill이라 시각 구분 명확 */
.filters-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filters-bar .filters { margin-bottom: 0; }

/* ── Pagination (배치 테이블 하단) ── */
.pager {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 14px 0 4px;
}
.pager__btn {
  appearance: none;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  border: 1px solid var(--line-2);
  background: var(--surface);
  color: var(--ink-2);
  padding: 6px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.pager__btn:hover { border-color: var(--line-3); background: var(--bg-sunken); color: var(--ink); }
.pager__btn:disabled { color: var(--ink-4); cursor: not-allowed; opacity: 0.55; }
.pager__btn:disabled:hover { border-color: var(--line-2); background: var(--surface); color: var(--ink-4); }
.pager__info {
  font-size: 12.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  min-width: 110px;
  text-align: center;
}

.detail-row {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  margin-bottom: 4px;
  overflow: hidden;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.detail-row:hover { border-color: var(--line-2); }
.detail-row[data-state="mismatch"] { border-left: 2px solid var(--fail); }
.detail-row[data-state="only-a"],
.detail-row[data-state="only-b"]   { border-left: 2px solid var(--warn); }
.detail-row[data-state="match"]    { border-left: 2px solid var(--pass); }
.detail-row[data-open="true"] {
  border-color: var(--line-2);
  box-shadow: var(--shadow-sm);
}

.detail-row__head {
  display: grid;
  grid-template-columns: 140px 88px 1fr 16px;
  align-items: center;
  gap: 14px;
  padding: 10px 14px 10px 12px;
  cursor: pointer;
  user-select: none;
  font-size: 13.5px;
}
.detail-row__head:hover { background: var(--bg-sunken); }
.detail-row__head--plain { cursor: default; }
.detail-row__head--plain:hover { background: transparent; }
.detail-row__head::after {
  content: "";
  width: 6px; height: 6px;
  border-right: 1.5px solid var(--ink-4);
  border-bottom: 1.5px solid var(--ink-4);
  transform: rotate(-45deg);
  justify-self: end;
  transition: transform 0.15s;
}
.detail-row[data-open="true"] .detail-row__head::after {
  transform: rotate(45deg);
  border-color: var(--ink-2);
}
.detail-row__head--plain::after { display: none; }
.detail-row__head--plain { grid-template-columns: 130px 80px 1fr; }

.detail-row__key {
  display: flex;
  flex-direction: column;
  min-width: 0;
  line-height: 1.15;
}
/* Eyebrow: PK 칼럼명을 값 위에 작은 라벨로 (10이 무슨 숫자인지 명확히) */
.detail-row__keyLbl {
  font-family: var(--sans);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-4);
  font-weight: 500;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-row__keyVal {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-row__preview {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-row__body {
  padding: 4px 12px 12px;
  border-top: 1px solid var(--line);
  background: var(--surface-2);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── Badges ────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12.5px;
  font-weight: 500;
  padding: 3px 9px 2px;
  border-radius: 4px;
  border: 1px solid transparent;
  font-family: var(--sans);
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.badge::before {
  content: "";
  width: 5px; height: 5px;
  border-radius: 50%;
  flex: none;
}
.badge--match {
  color: var(--pass-2);
  background: var(--pass-soft);
  border-color: var(--pass-border);
}
.badge--match::before { background: var(--pass); }
.badge--mismatch {
  color: var(--fail-2);
  background: var(--fail-soft);
  border-color: var(--fail-border);
}
.badge--mismatch::before { background: var(--fail); }
.badge--only {
  color: var(--warn-2);
  background: var(--warn-soft);
  border-color: var(--warn-border);
}
.badge--only::before { background: var(--warn); }

/* ── D · Diff pairs ────────────────────────────────────────────── */
.diffpair {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.diffpair__col {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--bg-sunken);
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-3);
}
.diffpair__col .mono {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
}
.diffpair__col .badge { margin-left: auto; }

/* Per-column diff state — subtly tints the header so match/only rows
 * read distinct from mismatch ones at a glance, even before reading the
 * column values. The actual side__val styling stays neutral. */
.diffpair[data-state="match"] .diffpair__col {
  background: var(--pass-soft);
  color: var(--pass-2);
}
.diffpair[data-state="match"] .diffpair__col .mono { color: var(--pass-2); }
.diffpair[data-state="only"] .diffpair__col {
  background: var(--warn-soft);
  color: var(--warn-2);
}
.diffpair[data-state="only"] .diffpair__col .mono { color: var(--warn-2); }

.diffpair__sides {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--line);
  gap: 1px;
}
.side {
  background: var(--surface);
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}
.side__label {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-3);
  letter-spacing: -0.005em;
}
.side:nth-child(1) .side__label { color: var(--ink-2); }
.side:nth-child(2) .side__label { color: var(--ink-2); }

.side__val {
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink);
  word-break: break-all;
  white-space: pre-wrap;
}
/* hex 아래에 작은 디코딩 텍스트 — UTF-8/SJIS 자동 디코딩으로 사람 가독성 확보 */
.side__decoded {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.4;
  word-break: break-word;
  white-space: pre-wrap;
}
.side__decoded::before {
  content: "→ ";
  color: var(--ink-4);
}

/* ── Diff units ────────────────────────────────────────────────── */
.u { display: inline; padding: 0; border-radius: 0; }
.u.diff {
  background: var(--diff-bg);
  color: var(--diff-fg);
  font-weight: 600;
  border-radius: 2px;
  padding: 0 1px;
  margin: 0 -1px;
}
.u.diff.residual {
  background: var(--diff-residual-bg);
  color: var(--diff-residual-fg);
  font-weight: 600;
  text-decoration: underline dotted currentColor;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}
.empty {
  font-family: var(--mono);
  display: inline-block;
  color: var(--ink-3);
  background: var(--bg-sunken);
  border: 1px dashed var(--line-2);
  padding: 0 8px;
  border-radius: 3px;
  font-style: normal;
  letter-spacing: 0.02em;
  font-size: 12.5px;
}
.empty::before { content: "∅ "; color: var(--ink-2); font-weight: 600; }

/* ── Per-table drilldown ───────────────────────────────────────── */
/* Nested record-level view inside an expanded batch row. Shares the
 * .filters and .detail-row component vocabulary from single-table mode. */

.drilldown {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.drilldown__head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 2px 0 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.drilldown__title {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.drilldown__title .mono {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
}
.drilldown__sep {
  color: var(--ink-4);
  font-weight: 400;
  font-size: 12px;
}
.drilldown__meta {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
.drilldown__meta .mono {
  font-size: 13.5px;
  color: var(--ink);
  font-weight: 500;
}
.drilldown__arrow {
  color: var(--ink-4);
  font-size: 13px;
  padding: 0 1px;
}
.drilldown__metaLbl {
  font-family: var(--sans);
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-4);
  margin-left: 4px;
  font-weight: 500;
}
.drilldown .filters {
  margin: 2px 0 6px;
}
.drilldown__rows {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
/* When a drilldown sits inside a flat-table cell, the surrounding td is
 * already padded — kill the inner padding so contents land flush. */
.batch-table__drilldown-inner .drilldown {
  padding: 0;
}
/* Inside a drilldown the nested detail-rows should look slightly subdued
 * relative to the top-level table row that triggered them. */
.drilldown .detail-row {
  border-color: var(--line);
  background: var(--surface);
}
.drilldown .detail-row__head {
  font-size: 13px;
}
.drilldown .detail-row__keyVal {
  font-size: 13.5px;
}

/* ── Batch dashboard — flat table layout ───────────────────────── */

.batch-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin: 0;
}
.batch-table thead th {
  text-align: left;
  padding: 8px 12px 10px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  white-space: nowrap;
  user-select: none;
}
.batch-table thead th.num {
  text-align: right;
}
.batch-table thead th[data-sortable="1"] {
  cursor: pointer;
  transition: color 0.1s;
}
.batch-table thead th[data-sortable="1"]:hover { color: var(--ink); }
.batch-table thead th[data-sortable="1"] > span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.batch-table thead th[data-sortable="1"] > span::after {
  content: "";
  display: inline-block;
  width: 0; height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid var(--ink-4);
  opacity: 0.45;
  transition: opacity 0.1s, border-color 0.1s;
}
.batch-table thead th[aria-sort="ascending"] > span::after {
  border-top: 0;
  border-bottom: 4px solid var(--ink);
  opacity: 1;
}
.batch-table thead th[aria-sort="descending"] > span::after {
  border-top: 4px solid var(--ink);
  opacity: 1;
}

.batch-table tbody tr {
  transition: background 0.08s;
}
.batch-table__row td {
  padding: 12px 12px;
  /* 한 단계 더 흐린 hairline — 가시성 유지하면서 시각 무게 절반 */
  border-bottom: 1px solid color-mix(in oklch, var(--line) 55%, transparent);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 13.5px;
  color: var(--ink);
  vertical-align: middle;
  letter-spacing: 0;
}
.batch-table__row td.num { text-align: right; }
.batch-table__row td[data-zero="1"] { color: var(--ink-4); }

/* Left-edge state strip on first cell — no card chrome needed */
.batch-table__row td:first-child {
  position: relative;
  padding-left: 16px;
}
.batch-table__row[data-state="match"]    td:first-child::before,
.batch-table__row[data-state="mismatch"] td:first-child::before,
.batch-table__row[data-state="only-a"]   td:first-child::before,
.batch-table__row[data-state="only-b"]   td:first-child::before {
  content: "";
  position: absolute;
  /* bottom: -1px → 좌측 색상 스트라이프가 셀의 border-bottom 위까지 덮어 가로선을 끊음 */
  left: 0; top: 0; bottom: -1px;
  width: 2px;
  background: transparent;
}
.batch-table__row[data-state="match"]    td:first-child::before { background: var(--pass); }
.batch-table__row[data-state="mismatch"] td:first-child::before { background: var(--fail); }
.batch-table__row[data-state="only-a"]   td:first-child::before,
.batch-table__row[data-state="only-b"]   td:first-child::before { background: var(--warn); }

.batch-table__row--expandable { cursor: pointer; }
.batch-table__row--expandable:hover {
  background: var(--bg-sunken);
}
.batch-table__row[data-open="true"] {
  background: var(--bg-sunken);
}
.batch-table__row[data-open="true"] td { border-bottom-color: var(--line-2); }

/* State-tinted numeric cells */
.batch-table .cell-mismatch:not([data-zero="1"]) { color: var(--fail-2); font-weight: 600; }
.batch-table .cell-miss:not([data-zero="1"])     { color: var(--warn-2); font-weight: 600; }
.batch-table .cell-extra:not([data-zero="1"])    { color: var(--warn-2); font-weight: 600; }
.batch-table .cell-delta:not([data-zero="1"])    { color: var(--fail-2); font-weight: 600; }
.batch-table .cell-match { color: var(--ink); }
.batch-table[data-state] { /* unused */ }
.batch-table__row[data-state="match"] .cell-match { color: var(--pass-2); }

.batch-table .cell-name { min-width: 160px; }
.batch-table .cell-name .mono {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
}
.batch-table .cell-badge { width: 72px; }

.batch-table .cell-excl {
  max-width: 220px;
}
.batch-table .cell-excl .excl-empty { color: var(--ink-4); padding-left: 2px; }
.batch-table .cell-excl .excl-chips {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.batch-table .cell-excl .chip {
  font-size: 11.5px;
  padding: 1px 7px 0;
  color: var(--ink-3);
  background: var(--bg-sunken);
  border-color: var(--line);
}

/* Drill-down row — full-width slot under expanded row */
.batch-table__drilldown > td {
  padding: 0;
  background: var(--surface-2);
  border-bottom: 1px solid var(--line);
}
.batch-table__drilldown[data-state="mismatch"] > td {
  box-shadow: inset 2px 0 0 var(--fail);
}
.batch-table__drilldown-inner {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px 16px 16px;
}

/* Hide the legacy card legend when in table layout (legend lives in thead instead) */
.batch-board:has(.batch-table) .batch-board__legend { display: none; }

@media (max-width: 1000px) {
  .batch-table { font-size: 13px; }
  .batch-table__row td { padding: 10px 8px; font-size: 13px; }
  .batch-table thead th { padding: 8px 8px 9px; font-size: 10.5px; }
}
@media (max-width: 900px) {
  /* Collapse table to two-line cards on narrow screens */
  .batch-table, .batch-table thead, .batch-table tbody,
  .batch-table tr, .batch-table th, .batch-table td { display: block; }
  .batch-table thead { display: none; }
  .batch-table__row { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .batch-table__row td { padding: 2px 0; border: 0; display: inline-block; }
  .batch-table__row td.num::before {
    content: attr(data-label) " ";
    color: var(--ink-3);
    font-family: var(--sans);
    font-size: 11px;
    margin-right: 4px;
  }
}

/* ── Batch dashboard ───────────────────────────────────────────── */
/* Multi-table comparison summary. Each .detail-row is one table.
 * The data line below the head is promoted to a column-aligned grid
 * so all rows align across columns — sortable-feeling header above. */

.batch-board {
  display: flex;
  flex-direction: column;
  gap: 4px;
  /* shared column grid — applied to both legend + every row stats line.
   * keep template-columns identical on both sides for visual alignment. */
  --bb-grid:
    minmax(0, 56px)       /* col-count   */
    minmax(0, 56px)       /* diff-cols   */
    minmax(0, 92px)       /* As-Is rows  */
    minmax(0, 92px)       /* To-Be rows  */
    minmax(140px, 1.2fr); /* excluded    */
}

.batch-board__legend {
  display: grid;
  grid-template-columns: var(--bb-grid);
  gap: 14px;
  align-items: end;
  padding: 4px 14px 8px;
  margin: 0 0 2px 16px; /* indent to align under the .detail-row__stats which sits inside the row */
  border-bottom: 1px solid var(--line);
}
.batch-board__legend > span {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.batch-board__legend .num { justify-content: flex-end; text-align: right; }
.batch-board__legend .sortable {
  cursor: pointer;
  user-select: none;
  transition: color 0.1s;
}
.batch-board__legend .sortable:hover { color: var(--ink); }
.batch-board__legend .sortable::after {
  content: "";
  display: inline-block;
  width: 0; height: 0;
  margin-left: 2px;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid var(--ink-4);
  opacity: 0.55;
}
.batch-board__legend [aria-sort="ascending"]::after {
  border-top: 0;
  border-bottom: 4px solid var(--ink);
  opacity: 1;
}
.batch-board__legend [aria-sort="descending"]::after {
  border-top: 4px solid var(--ink);
  opacity: 1;
}

/* Batch rows reuse .detail-row but its head changes layout. */
.detail-row--batch .detail-row__head {
  /* table-name · badge · row-dashcounts · chevron */
  grid-template-columns: minmax(0, 1.4fr) 80px minmax(0, 1.6fr) 16px;
  padding: 11px 14px 4px 12px;
}
.detail-row--batch .detail-row__head .detail-row__preview {
  font-size: 13px;
}

/* Dashcount preview — match/mismatch/missing/extra in one slug,
 * each segment colored by state and dimmed to ink-4 when zero. */
.dashcount {
  display: inline-flex;
  align-items: baseline;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0;
}
.dashcount__seg {
  padding: 0 7px;
  font-weight: 500;
}
.dashcount__seg:first-child { padding-left: 0; }
.dashcount__seg + .dashcount__seg { border-left: 1px solid var(--line-2); }
.dashcount__seg.match    { color: var(--pass-2); }
.dashcount__seg.mismatch { color: var(--fail-2); }
.dashcount__seg.miss     { color: var(--warn-2); }
.dashcount__seg.extra    { color: var(--warn-2); }
.dashcount__seg[data-zero="1"] { color: var(--ink-4); font-weight: 400; }
.dashcount__lbl {
  font-family: var(--sans);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-4);
  margin-right: 4px;
  font-weight: 500;
}

/* Per-row stats grid — sits below the head, indented under the table-name column. */
.detail-row__stats {
  display: grid;
  grid-template-columns: var(--bb-grid);
  gap: 14px;
  align-items: center;
  padding: 4px 14px 10px;
  margin-left: 16px;
  border-top: 1px dashed var(--line);
  margin-top: 4px;
}
.detail-row__stat {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 14px;
  color: var(--ink);
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0;
}
.detail-row__stat[data-zero="1"]  { color: var(--ink-4); }
.detail-row__stat[data-state="warn"] {
  color: var(--fail-2);
  font-weight: 600;
}
.detail-row__stat--excl {
  text-align: left;
  font-size: 12.5px;
  color: var(--ink-2);
  display: inline-flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
}
.detail-row__stat--excl[data-empty="1"] { color: var(--ink-4); }
.detail-row__stat--excl .chip {
  font-size: 11.5px;
  padding: 1px 6px 0;
  background: var(--bg-sunken);
  color: var(--ink-3);
  border-color: var(--line);
}

/* compact bar: at a glance ratio of match : mismatch+missing+extra for the row.
 * Optional decorative element — keeps PASS rows visually quiet, surfaces FAIL ratio. */
.detail-row--batch .detail-row[data-state] .detail-row__head .detail-row__preview {
  /* keep colors handled by .dashcount */
}

/* PASS rows: slightly subdued numeric block so failures pop. */
.detail-row--batch[data-state="match"] .detail-row__stat {
  color: var(--ink-2);
}
.detail-row--batch[data-state="match"] .detail-row__stat[data-zero="1"] {
  color: var(--ink-4);
}

/* unpaired files notice — under the board */
.batch-board__unpaired {
  margin-top: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.batch-board__unpaired .warn {
  margin: 0;
  align-items: flex-start;
}
.batch-board__unpaired .warn .small {
  display: block;
  margin-top: 4px;
  font-family: var(--mono);
  color: var(--warn-2);
  opacity: 0.85;
}

/* Sticky legend feel: shadow on first row to anchor */
.batch-board__legend + .detail-row { margin-top: 2px; }

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 1000px) {
  .batch-board {
    --bb-grid: minmax(0, 48px) minmax(0, 48px) minmax(0, 78px) minmax(0, 78px) minmax(110px, 1fr);
  }
  .batch-board__legend > span { font-size: 10.5px; letter-spacing: 0.04em; }
  .detail-row__stat { font-size: 13px; }
}

@media (max-width: 900px) {
  .uploads { grid-template-columns: 1fr; }
  .uploads > .drop:nth-of-type(2) { grid-column: 1; grid-row: 2; }
  .verdict { grid-template-columns: 1fr; text-align: center; gap: 16px; }
  .verdict__meta { text-align: center; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .metric { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .metric:nth-child(2n) { border-right: 0; }
  .detail-row__head { grid-template-columns: 1fr auto 16px; }
  .detail-row__preview { display: none; }
  .diffpair__sides { grid-template-columns: 1fr; gap: 0; }
  .side:first-child { border-bottom: 1px solid var(--line); }
  .batch-board__legend { display: none; }
  .detail-row--batch .detail-row__head { grid-template-columns: 1fr auto 16px; }
  .detail-row__stats {
    grid-template-columns: 1fr 1fr;
    margin-left: 0;
    padding: 8px 12px 10px;
  }
  .detail-row__stat { text-align: left; }
  .detail-row__stat--excl { grid-column: 1 / -1; }
  .batch-board__unpaired { grid-template-columns: 1fr; }
}

/* ── 배치 판정 배너 — 메타를 가로 stat 바로 (콤팩트, 디자인 .verdict 오버라이드) ── */
.verdict { grid-template-columns: auto 1fr; }
.verdict__statbar {
  grid-column: 1 / -1;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 28px;
  margin-top: 14px;
}
.verdict__stat-item {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-3);
}
.verdict__stat-item b {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
}
@media (max-width: 720px) { .verdict { grid-template-columns: 1fr; } }

/* ── 헤더 호버 툴팁 (th 자체 ::after/::before — span::after는 정렬 화살표라 회피) ── */
.batch-table thead th[data-tip] { position: relative; }
.batch-table thead th[data-tip]:not([data-sortable]) { cursor: help; }
.batch-table thead th[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  white-space: nowrap;
  background: var(--ink);
  color: #fff;
  font-size: 12px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: -0.005em;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  box-shadow: var(--shadow);
  pointer-events: none;
}
.batch-table thead th[data-tip]:hover::before {
  content: "";
  position: absolute;
  top: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-bottom-color: var(--ink);
  z-index: 30;
  pointer-events: none;
}

/* ── 펼침 어포던스: 행 좌측 셰브런 + 드릴다운 헤더의 닫기 버튼 ── */
.batch-table__chev {
  display: inline-block;
  width: 1em;
  margin-right: 6px;
  color: var(--ink-3);
  font-size: 11px;
  transition: color 120ms ease;
  user-select: none;
}
.batch-table__row--expandable:hover .batch-table__chev,
.batch-table__row[data-open="true"] .batch-table__chev { color: var(--ink); }

.drilldown__close { white-space: nowrap; }

/* Site-wide tool navigation. Sits above .app on every page.
 * Visual: thin top bar, subtle border, tab-style links.
 * Tokens come from styles.css / charset-styles.css (:root). */

.sitenav {
  width: 100%;
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--line, oklch(93% 0.003 270));
}
.sitenav__inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 32px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.sitenav__brand {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2, oklch(40% 0.006 270));
  letter-spacing: -0.005em;
  text-decoration: none;
}
.sitenav__tabs {
  display: flex;
  gap: 4px;
  align-items: center;
}
.sitenav__tab {
  display: inline-flex;
  align-items: center;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-3, oklch(55% 0.005 270));
  text-decoration: none;
  border-radius: var(--r-sm, 6px);
  transition: background-color 120ms ease, color 120ms ease;
}
.sitenav__tab:hover {
  color: var(--ink, oklch(22% 0.005 270));
  background: var(--bg-sunken, oklch(97.5% 0 0));
}
.sitenav__tab--active {
  color: var(--accent, oklch(52% 0.18 268));
  background: var(--accent-soft, oklch(96% 0.025 268));
}
.sitenav__tab--active:hover {
  background: var(--accent-soft, oklch(96% 0.025 268));
}
.sitenav__tab:focus-visible {
  outline: 2px solid var(--focus-ring, oklch(85% 0.10 268));
  outline-offset: 2px;
}

/* Reduce top padding of .app when sitenav is present (no need for 52px).
 * Selector is forgiving — works whether sitenav is sibling of #root or inside it. */
.sitenav ~ #root .app,
.sitenav + #root .app {
  padding-top: 28px;
}
</style>
</head>
<body>
<nav class="sitenav" id="sitenav" aria-label="Tools"></nav>
<div id="root"></div>

  // ── 표시 전용 diff 유틸 (§4-3, §8-D, §9) — 판정과 무관 ──

  // 헥스 판별: 짝수 길이 + 16진수 문자
  function isHex(str) {
    return typeof str === "string" && str.length > 0 && str.length % 2 === 0 && /^[0-9a-fA-F]+$/.test(str);
  }

  // 길이 다르면 긴 쪽 잔여 유닛에 residual 표시 (§9 "한쪽에만 잔여 유닛")
  // byteMode는 byteOption이 켜져 있고 양쪽 모두 헥스일 때만 적용.
  function diffUnits(aRaw, bRaw, byteOption) {

      var x = i < ua.length ? ua[i] : null;
      var y = i < ub.length ? ub[i] : null;
      if (x !== null && y !== null) {
        var d = x !== y;

        rb.push({ text: y, diff: d });
      } else if (x !== null) {
        ra.push({ text: x, diff: true, residual: true });
      } else {
        rb.push({ text: y, diff: true, residual: true });
      }
    }
    return { byteMode: byteMode, a: ra, b: rb };
  }

  // ── 배치(다건) 헬퍼 (순수) — 부록 spec-batch-addendum.md ──

  // 파일명 정확히 일치로 As-Is/To-Be 짝지음. As-Is 순서 유지.
  function pairByName(asIsNames, toBeNames) {

  }

  // 전체 판정: 모든 쌍 PASS AND 미매칭 0 → PASS. (§4)
  // pairResults: compareData 결과 객체 배열. unmatchedCount: 짝 없는 파일 수.
  function batchVerdict(pairResults, unmatchedCount) {
    pairResults = pairResults || [];
    unmatchedCount = unmatchedCount || 0;
    var passed = 0, failed = 0;
    var agg = { total: 0, matched: 0, mismatched: 0, onlyAsIs: 0, onlyToBe: 0 };
    pairResults.forEach(function (r) {
      if (r.verdict === "PASS") passed++; else failed++;
      agg.total += r.summary.total;
      agg.matched += r.summary.matched;
      agg.mismatched += r.summary.mismatched;
      agg.onlyAsIs += r.summary.onlyAsIs;
      agg.onlyToBe += r.summary.onlyToBe;
    });
    return {
      verdict: (failed === 0 && unmatchedCount === 0) ? "PASS" : "FAIL",
      tables: pairResults.length,
      passed: passed,
      failed: failed,
      unmatched: unmatchedCount,
      agg: agg
    };
  }

  return {
    DIFF_SEP: DIFF_SEP,
    commonColumns: commonColumns,
    guessPk: guessPk,
    indexByPk: indexByPk,
    compareData: compareData,
    computeVerdict: computeVerdict,
    isHex: isHex,
    splitUnits: splitUnits,
    diffUnits: diffUnits,
    keyOf: keyOf,
    autoKey: autoKey,
    pairByName: pairByName,
    batchVerdict: batchVerdict
  };
});

                  ${p.configError
                    ? html`<span class="excl-empty" title=${p.configError === "noCommon" ? t("err.noCommon") : t("err.noInspect")}>⚠</span>`
                    : (p.excluded.length === 0 ? html`<span class="excl-empty">—</span>` : html`<span class="excl-chips">${p.excluded.map(function (c) { return html`<span key=${c} class="chip">${c}</span>`; })}</span>`)}
                </td>
              </tr>
              ${open && expandable ? html`<tr class="batch-table__drilldown" data-state=${pass ? "match" : "mismatch"}><td colSpan="11"><div class="batch-table__drilldown-inner"><${Drilldown} pair=${p.pair} byteMode=${byteMode} onClose=${function () { anchorScroll(document.querySelector('tr[data-row-name="' + (window.CSS && CSS.escape ? CSS.escape(p.name) : p.name.replace(/"/g, '\\"')) + '"]'), function () { setOpenName(null); }); }} /></div></td></tr>` : null}
            <//>`;
          })}
        </tbody>
      </table>
      ${totalPages > 1 ? html`
        <nav class="pager" aria-label="pagination">
          <button class="pager__btn" type="button" disabled=${curPage === 1} onClick=${function () { setPage(curPage - 1); }}>← ${t("pager.prev")}</button>
          <span class="pager__info">${t("pager.page", { cur: curPage, total: totalPages })}</span>
          <button class="pager__btn" type="button" disabled=${curPage === totalPages} onClick=${function () { setPage(curPage + 1); }}>${t("pager.next")} →</button>
        </nav>` : null}
    <//>`;
  }

  // ── 대시보드 보드 (필터 + 정렬 테이블 + 미매칭) ──
  function BatchBoard(props) {
    var t = useT(); var batch = props.batch, byteMode = props.byteMode;
    var fl = useState("all");
    var filter = fl[0], setFilter = fl[1];
    var sk = useState("name"); var sortKey = sk[0], setSortKey = sk[1];
    var sd = useState("asc"); var sortDir = sd[0], setSortDir = sd[1];
    var rows = useMemo(function () {
      return batch.pairs.map(function (p) {
        var r = p.result;
        return {
          name: p.name, verdict: r.verdict, state: r.verdict === "PASS" ? "match" : "mismatch",
          match: r.summary.matched, mismatch: r.summary.mismatched, miss: r.summary.onlyAsIs, extra: r.summary.onlyToBe,
          cols: p.common.length, diffCols: (r.diffColumns || []).length, aCount: p.aCount, bCount: p.bCount,
          excluded: r.excludedCols || [], configError: r.configError, pair: p
        };
      });
    }, [batch]);
    var counts = { all: rows.length, match: rows.filter(function (r) { return r.state === "match"; }).length, problems: rows.filter(function (r) { return r.state !== "match"; }).length };
    var filtered = useMemo(function () {
      var rs = rows;
      if (filter === "problems") rs = rs.filter(function (r) { return r.state !== "match"; });
      else if (filter === "match") rs = rs.filter(function (r) { return r.state === "match"; });
      return rs.slice().sort(function (a, b) {
        var av = a[sortKey], bv = b[sortKey];
        var cmp = typeof av === "string" ? String(av).localeCompare(bv) : av - bv;
        return sortDir === "asc" ? cmp : -cmp;
      });
    }, [rows, filter, sortKey, sortDir]);
    function toggleSort(k) { if (sortKey === k) setSortDir(sortDir === "asc" ? "desc" : "asc"); else { setSortKey(k); setSortDir(k === "name" ? "asc" : "desc"); } }
    var FILTERS = [["all", "board.filterAll"], ["problems", "board.filterFail"], ["match", "board.filterPass"]];
    var unmatched = batch.onlyAsIs.length + batch.onlyToBe.length;
    return html`
      <div class="card">
        <h3 class="card__title">${t("dash.title")}</h3>
        <p class="card__subtitle small">${rich(t("dash.subtitle", { n: batch.pairs.length }))}</p>
        <div class="filters" role="tablist">
          ${FILTERS.map(function (x) { return html`<button key=${x[0]} aria-pressed=${filter === x[0]} onClick=${function () { setFilter(x[0]); }}>${t(x[1])} <span class="count">${fmt(counts[x[0]])}</span></button>`; })}
        </div>
        <div class="batch-board">
          <${BatchTable} rows=${filtered} byteMode=${byteMode} sortKey=${sortKey} sortDir=${sortDir} onSort=${toggleSort} />
          ${unmatched
            ? html`<div class="batch-board__unpaired">
                ${batch.onlyAsIs.length ? html`<div class="warn"><div>${rich(t("board.unpairedAsIs", { n: batch.onlyAsIs.length }))}<span class="small">${batch.onlyAsIs.join(", ")}</span></div></div>` : null}
                ${batch.onlyToBe.length ? html`<div class="warn"><div>${rich(t("board.unpairedToBe", { n: batch.onlyToBe.length }))}<span class="small">${batch.onlyToBe.join(", ")}</span></div></div>` : null}
              </div>`
            : null}
        </div>
      </div>`;
  }

  // ── CSV 내보내기 (영어 enum/키 고정 — 다운스트림 툴링 호환) ──
  // 본문: key / status / diff_columns + 한 번이라도 차이가 난 칼럼(`r.diffColumns`)만
  // As-Is/To-Be 페어로 노출. 전건 일치 칼럼은 본문에서 제외해 폭 절감.
  // 검사 대상 전체 칼럼은 상단 meta의 `inspected_columns`에서 그대로 추적 가능.
  function exportPairCsv(r, filename) {
    var meta = [
      ["verdict", r.verdict], ["total", r.summary.total], ["matched", r.summary.matched], ["mismatched", r.summary.mismatched],
      ["missing_in_tobe", r.summary.onlyAsIs], ["extra_in_tobe", r.summary.onlyToBe],
      ["pk", (r.pk || []).join(C.DIFF_SEP)], ["inspected_columns", r.inspectedCols.join(C.DIFF_SEP)], ["excluded_columns", r.excludedCols.join(C.DIFF_SEP)],
      ["dupe_keys_as_is", r.dupesAsIs.join(C.DIFF_SEP)], ["dupe_keys_to_be", r.dupesToBe.join(C.DIFF_SEP)]
    ];
    var bodyCols = r.diffColumns || []; // 슬림 Wide: diff가 한 번이라도 발생한 칼럼만
    var headers = ["key", "status", "diff_columns"];
    bodyCols.forEach(function (c) { headers.push(c + "[As-Is]", c + "[To-Be]"); });
    var rows = r.rows.map(function (row) {
      var aRow = r.asIsIndex.get(row.key), bRow = r.toBeIndex.get(row.key);
      var rec = { key: row.key, status: row.status, diff_columns: row.diffCols.join(C.DIFF_SEP) };
      bodyCols.forEach(function (c) {
        rec[c + "[As-Is]"] = aRow && aRow[c] != null ? String(aRow[c]) : "";
        rec[c + "[To-Be]"] = bRow && bRow[c] != null ? String(bRow[c]) : "";
      });
      return rec;
    });
    download(Papa.unparse(meta, { header: false }) + "\r\n\r\n" + Papa.unparse(rows, { columns: headers }), filename);
  }
  // 실무자가 Excel/메모장에서 한눈에 읽도록 설계한 사람-친화 리포트(3 섹션 · 언어 따름):
  //   1) 상단 요약(생성일시·전체 판정·누적 레코드)  2) 짝 없는 파일  3) 테이블별 결과(테이블명 맨 왼쪽)
  function exportBatchCsv(t, batch, filename) {
    var s = batch.summary;
    function fmtTs() {
      var d = new Date(); function p(n) { return String(n).padStart(2, "0"); }
      return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
    }
    var verdictLabel = s.verdict === "PASS" ? "Pass" : "Fail";
    var verdictSummary = verdictLabel + " — " +
      t("batchVerdict.metaTables") + " " + s.tables +
      " (" + t("batch.metaPassed") + " " + s.passed +
      " · " + t("batch.metaFailed") + " " + s.failed +
      (s.unmatched ? " · " + t("batch.metaUnmatched") + " " + s.unmatched : "") + ")";
    var rowsSummary = s.agg.total +
      " (" + t("metrics.matched") + " " + s.agg.matched +
      " · " + t("metrics.mismatched") + " " + s.agg.mismatched +
      " · " + t("metrics.onlyAsIs") + " " + s.agg.onlyAsIs +
      " · " + t("metrics.onlyToBe") + " " + s.agg.onlyToBe + ")";

    // 섹션 1 — 요약
    var sections = [
      [t("csv.title")],
      [""],
      [t("csv.generatedAt"), fmtTs()],
      [t("csv.verdictLabel"), verdictSummary],
      [t("csv.rowsLabel"), rowsSummary]
    ];

    // 섹션 2 — 짝 없는 파일 (있을 때만)
    var unmatchedRows = [].concat(
      batch.onlyAsIs.map(function (n) { return [n, t("metrics.onlyAsIs")]; }),
      batch.onlyToBe.map(function (n) { return [n, t("metrics.onlyToBe")]; })
    );
    if (unmatchedRows.length) {
      sections.push([""], [t("csv.unmatchedSection")], [t("csv.fileColumn"), t("csv.sideColumn")]);
      unmatchedRows.forEach(function (r) { sections.push(r); });
    }

    // 섹션 3 — 테이블별 결과 (테이블명 맨 왼쪽)
    sections.push([""], [t("csv.tablesSection")], [
      t("csv.colTable"), t("csv.colVerdict"),
      t("csv.colTotal"), t("csv.colMatch"), t("csv.colMismatch"), t("csv.colMiss"), t("csv.colExtra"),
      t("csv.colCols"), t("csv.colDiffCols"), t("csv.colDiffList"),
      t("csv.colPk"), t("csv.colExcluded"),
      t("csv.colACount"), t("csv.colBCount")
    ]);
    // 실패가 먼저, 그 안에서는 알파벳 순 — 실무자가 위에서부터 문제 테이블을 바로 확인.
    var orderedPairs = batch.pairs.slice().sort(function (a, b) {
      var fa = a.result.verdict === "FAIL" ? 0 : 1, fb = b.result.verdict === "FAIL" ? 0 : 1;
      if (fa !== fb) return fa - fb;
      return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
    });
    orderedPairs.forEach(function (p) {
      var r = p.result;
      sections.push([
        p.name, r.verdict === "PASS" ? "Pass" : "Fail",
        r.summary.total, r.summary.matched, r.summary.mismatched, r.summary.onlyAsIs, r.summary.onlyToBe,
        p.common.length, (r.diffColumns || []).length, (r.diffColumns || []).join(" | "),
        (r.pk || []).join(" | "), (r.excludedCols || []).join(" | "),
        p.aCount, p.bCount
      ]);
    });

    download(Papa.unparse(sections, { header: false }), filename);
  }

  // ── 배치 계산 (순수) ──
  function computeBatch(aFiles, bFiles, overrides, byteMode) {
    var aMap = {}, bMap = {};
    aFiles.forEach(function (f) { if (!(f.fileName in aMap)) aMap[f.fileName] = f; });
    bFiles.forEach(function (f) { if (!(f.fileName in bMap)) bMap[f.fileName] = f; });
    var p = C.pairByName(aFiles.map(function (f) { return f.fileName; }), bFiles.map(function (f) { return f.fileName; }));
    var pairs = p.pairs.map(function (name) {
      var a = aMap[name], b = bMap[name];
      var common = C.commonColumns(a.columns, b.columns);
      var ov = overrides[name] || {};
      var keyCols = (ov.pk && ov.pk.length) ? ov.pk.filter(function (c) { return common.indexOf(c) >= 0; }) : C.autoKey(a.rows, common);
      if (!keyCols.length && common.length) keyCols = common.slice(0, 1);
      var excludedSet = ov.excluded || new Set();
      var inspect = common.filter(function (c) { return keyCols.indexOf(c) < 0 && !excludedSet.has(c); });
      var excludedCols = common.filter(function (c) { return keyCols.indexOf(c) < 0 && excludedSet.has(c); });
      // PK 칼럼은 매칭 키로 그대로 사용. 나머지 셀은 원본 바이트를 무조건 hex로 변환해 비교.
      var pkSet = {}; keyCols.forEach(function (c) { pkSet[c] = true; });
      var aRows = a.rows.map(function (r) { return hexifyRow(r, pkSet); });
      var bRows = b.rows.map(function (r) { return hexifyRow(r, pkSet); });
      var result;
      if (common.length === 0 || inspect.length === 0) {
        result = {
          verdict: "FAIL", summary: { total: 0, matched: 0, mismatched: 0, onlyAsIs: 0, onlyToBe: 0 },
          reasons: { VALUE_MISMATCH: 0, MISSING_IN_TOBE: 0, EXTRA_IN_TOBE: 0 }, rows: [], diffColumns: [], dupesAsIs: [], dupesToBe: [],
          inspectedCols: inspect, excludedCols: excludedCols, pk: keyCols, asIsIndex: new Map(), toBeIndex: new Map(),
          configError: common.length === 0 ? "noCommon" : "noInspect"
        };
      } else {
        result = C.compareData({ asIsRows: aRows, toBeRows: bRows, pk: keyCols, inspectCols: inspect, excludedCols: excludedCols });
      }
      return { name: name, common: common, result: result, aCount: (aRows || []).length, bCount: (bRows || []).length, aEncoding: a.encoding, bEncoding: b.encoding };
    });
    var summary = C.batchVerdict(pairs.map(function (x) { return x.result; }), p.onlyAsIs.length + p.onlyToBe.length);
    return { pairs: pairs, onlyAsIs: p.onlyAsIs, onlyToBe: p.onlyToBe, summary: summary };
  }

  // ── 최상위 ──
  function App() {
    var sLang = useState(function () { return I.detectLang(); });
    var sA = useState([]), sB = useState([]);
    var sXF = useState(function () { return new Set(); });
    var sRan = useState(false);
    var lang = sLang[0], setLang = sLang[1];
    var aFiles = sA[0], setAFiles = sA[1];
    var bFiles = sB[0], setBFiles = sB[1];
    // diff 표시는 항상 바이트(hex 페어) 단위 — 셀 hex는 항상 짝수 길이고
    // byte-faithful 검증에 맞는 자연 단위. (이전엔 문자 단위 옵션을 두었으나 제거.)
    var byteMode = true;
    var excludedFiles = sXF[0], setExcludedFiles = sXF[1];
    var ran = sRan[0], setRan = sRan[1];

    var t = useMemo(function () { return I.makeT(lang); }, [lang]);

    // 사이트 네비 텍스트를 현재 언어와 동기화 (sitenav.js가 수신)
    useEffect(function () {
      try { window.dispatchEvent(new CustomEvent("langchange", { detail: lang })); } catch (e) {}
    }, [lang]);

    var activeA = useMemo(function () { return aFiles.filter(function (f) { return !excludedFiles.has(f.fileName); }); }, [aFiles, excludedFiles]);
    var activeB = useMemo(function () { return bFiles.filter(function (f) { return !excludedFiles.has(f.fileName); }); }, [bFiles, excludedFiles]);
    var pairing = useMemo(function () {
      if (!activeA.length || !activeB.length) return null;
      return C.pairByName(activeA.map(function (f) { return f.fileName; }), activeB.map(function (f) { return f.fileName; }));
    }, [activeA, activeB]);
    var batch = useMemo(function () {
      if (!ran || !activeA.length || !activeB.length) return null;
      return computeBatch(activeA, activeB, {}, byteMode);
    }, [ran, activeA, activeB, byteMode]);

    function pick(setter, fileList) { setRan(false); setExcludedFiles(new Set()); parseFiles(fileList, function (arr) { setter(arr); }); }
    function toggleFile(name) { var nx = new Set(excludedFiles); if (nx.has(name)) nx.delete(name); else nx.add(name); setExcludedFiles(nx); setRan(false); }
    function run() { if (!pairing || !pairing.pairs.length) return; setRan(true); window.scrollTo(0, 0); }
    function reset() { setAFiles([]); setBFiles([]); setExcludedFiles(new Set()); setRan(false); }

    var header = html`
      <div class="app__header">
        <div class="app__headtext">
          <h1 class="app__title">${t("app.title")}</h1>
        </div>
        <label class="langselect">
          <span>${t("lang.label")}</span>
          <select value=${lang} onChange=${function (e) { setLang(e.target.value); }}>
            ${I.LANG_ORDER.map(function (code) { return html`<option key=${code} value=${code}>${I.LANG_NAMES[code]}</option>`; })}
          </select>
        </label>
      </div>`;

    var view;
    if (batch) {
      view = html`
        <div class="app">
          ${header}
          <div class="btnrow" style=${{ marginBottom: "16px" }}>
            <button class="btn btn--secondary" onClick=${function () { reset(); window.scrollTo(0, 0); }}>${t("restart.button")}</button>
            <button class="btn" onClick=${function () { exportBatchCsv(t, batch, "batch_summary_" + ts() + ".csv"); }}>${t("export.batchButton")}</button>
          </div>
          <${BatchVerdict} batch=${batch} />
          <${BatchMetrics} batch=${batch} />
          <${BatchBoard} batch=${batch} byteMode=${byteMode} />
        </div>`;
    } else {
      var canRun = pairing && pairing.pairs.length > 0;
      view = html`
        <div class="app">
          ${header}
          <div class="card">
            <h3 class="card__title">${t("screenA.title")}</h3>
            <p class="card__subtitle small">${t("screenA.subtitle")}</p>
            <div class="uploads">
              <${MultiDrop} role=${t("upload.roleAsIs")} subrole=${t("upload.subroleAsIs")} files=${aFiles} onPick=${function (fl) { pick(setAFiles, fl); }} />
              <${MultiDrop} role=${t("upload.roleToBe")} subrole=${t("upload.subroleToBe")} files=${bFiles} onPick=${function (fl) { pick(setBFiles, fl); }} />
            </div>
          </div>
          ${(aFiles.length && bFiles.length) ? html`<${PairingPreview} aFiles=${aFiles} bFiles=${bFiles} excluded=${excludedFiles} onToggle=${toggleFile} />` : null}
          <div class="btnrow">
            <button class="btn" disabled=${!canRun} onClick=${run}>${t("run.batchButton")}</button>
            <button class="btn btn--secondary" onClick=${reset}>${t("reset.button")}</button>
            <span class="small muted" style=${{ marginLeft: "4px" }}>${canRun ? t("pairing.matched", { n: pairing.pairs.length }) : t("run.batchHint")}</span>
          </div>
        </div>`;
    }

    return html`<${I18nCtx.Provider} value=${{ t: t, lang: lang }}>${view}<//>`;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
})();
</script>
<script id="sitenav-js">/* Site-wide tool navigation localizer.
 * Renders the .sitenav contents based on detected/selected language and
 * the data-tool attribute on <html>. Listens for 'langchange' events so
 * either page's language selector can keep the nav in sync. */
(function () {
  var DICT = {
    ko: { hex: "데이터 비교", charset: "문자 코드 변환" },
    ja: { hex: "データ比較", charset: "文字コード変換" },
    en: { hex: "Hex comparator", charset: "Charset converter" }
  };
  var LANGS = ["ko", "ja", "en"];

  function detect() {
    var l = (navigator.language || "en").toLowerCase();
    if (l.indexOf("ko") === 0) return "ko";
    if (l.indexOf("ja") === 0) return "ja";
    return "en";
  }

  function escapeAttr(s) {
    return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  }

  function render(lang) {
    if (LANGS.indexOf(lang) < 0) lang = "en";
    var d = DICT[lang];
    var active = document.documentElement.getAttribute("data-tool") || "hex";
    var nav = document.querySelector(".sitenav");
    if (!nav) return;
    var hexActive = active === "hex";
    var csActive = active === "charset";
    nav.setAttribute("data-lang", lang);
    nav.innerHTML =
      '<div class="sitenav__inner">' +
        '<div class="sitenav__tabs" role="tablist">' +
          '<a class="sitenav__tab' + (csActive ? " sitenav__tab--active" : "") + '"' +
            ' href="./charset.html" role="tab" aria-selected="' + (csActive ? "true" : "false") + '"' +
            (csActive ? ' aria-current="page"' : "") +
            '>' + escapeAttr(d.charset) + '</a>' +
          '<a class="sitenav__tab' + (hexActive ? " sitenav__tab--active" : "") + '"' +
            ' href="./index.html" role="tab" aria-selected="' + (hexActive ? "true" : "false") + '"' +
            (hexActive ? ' aria-current="page"' : "") +
            '>' + escapeAttr(d.hex) + '</a>' +
        '</div>' +
      '</div>';
  }

  function init() {
    render(detect());
    window.addEventListener("langchange", function (e) {
      var lang = e && e.detail;
      if (typeof lang === "string") render(lang);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
